name: worldview-backlog-refill
on:
  schedule:
    - cron: '13 */3 * * *'
  workflow_dispatch: {}
concurrency:
  group: worldview-epic
  cancel-in-progress: false
permissions:
  contents: write
  issues: read
  id-token: write
  actions: read
jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      needed: ${{ steps.gate.outputs.needed }}
      matrix: ${{ steps.gate.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: auto/worldview-epics
          fetch-depth: 0
      - name: Gate and build axis matrix
        id: gate
        run: |
          REMAIN=$(grep -c '^| жңӘ |' docs/reference-epic-backlog.md || echo 0)
          echo "backlog жңӘ: $REMAIN"
          if [ "$REMAIN" -ge 16 ]; then
            echo "needed=false" >> "$GITHUB_OUTPUT"
            echo "matrix=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "needed=true" >> "$GITHUB_OUTPUT"
          echo '' | base64 -d > /tmp/m.py
          M=$(python3 /tmp/m.py)
          echo "matrix=$M" >> "$GITHUB_OUTPUT"
  discover:
    needs: gate
    if: needs.gate.outputs.needed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      max-parallel: 6
      fail-fast: false
      matrix:
        item: ${{ fromJson(needs.gate.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: auto/worldview-epics
          fetch-depth: 0
      - name: Discover candidates on one axis
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ github.token }}
          AXIS: ${{ matrix.item.axis }}
          HINT: ${{ matrix.item.hint }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN || secrets.CC }}
          claude_args: '--allowedTools "Bash,Read,Grep,Glob,WebSearch"'
          prompt: |
            жҺўзҙўи»ёпјқз’°еўғеӨүж•° AXISгҖҒжҺўзҙўжҢҮзӨәпјқз’°еўғеӨүж•° HINTгҖӮгҒ“гҒ®и»ёгҒ§гҖҢжң¬гӮ·гӮ№гғҶгғ пјҲйҠҖиӢұдјқйўЁгҒ®жҳҹй–“еӣҪе®¶жҲҰз•ҘпјӢжҖқжғі/жӯҙеҸІ/зөҢжёҲ/зҫӨеғҸгӮ·гғҹгғҘпјүгҖҚгҒ®ж¬ иҗҪи»ёгҒ«еҠ№гҒҸгғҚгӮҝгӮ’жңҖеӨ§3д»¶зҷәжҺҳгҒҷгӮӢгҖӮ
            жүӢй Ҷпјҡ(1)йҮҚиӨҮйҷӨеӨ–пјҲеҝ…й Ҳпјүпјқdocs/reference-epic-backlog.md гҒ®ж—ўеӯҳиЎҢпјҲжёҲ/жңӘ/еҗёеҸҺпјүгғ»docs/*-reference-design.md гҒҢгҒӮгӮӢйЎҢжқҗгғ»gh issue list --state all --label type:epic --limit 100 гҒ®гӮҝгӮӨгғҲгғ«гғ»CLAUDE.mdгҖҢгғҶгӮ№гғҲеҹәзӣӨгҖҚзҜҖгҒ§ж—ўгҒ«гғўгӮёгғҘгғјгғ«еҢ–жёҲгҒҝгҒ®жҰӮеҝөгҖҒгҒЁйҮҚгҒӘгӮӢгӮӮгҒ®гҒҜйҒёгҒ°гҒӘгҒ„гҖӮ(2)ж•°еҗҲгӮҸгҒӣгӮ’гҒ—гҒӘгҒ„пјқзўәдҝЎгҒӮгӮӢгӮӮгҒ®гҒ гҒ‘пјҲжңҖеӨ§3д»¶гғ»0д»¶еҸҜпјүгғ»еҲҶйҮҺгҒ®еҒҸгӮҠгӮ’йҒҝгҒ‘гӮӢгҖӮ(3)еҗ„гғҚгӮҝгӮ’ /tmp/out/lines.txt гҒ«1иЎҢгҒҡгҒӨиҝҪиЁҳпјҲmkdir -p /tmp/out гҒ—гҒҰгҒӢгӮүпјүпјҡ| жңӘ | [AXISгҒ®еҖӨ] еҗҚз§° | зқҖзңјзӮ№пјқж¬ иҗҪи»ёпјӢж—ўеӯҳгғўгӮёгғҘгғјгғ«жҺҘз¶ҡе…Ҳ | вҖ” |
            0д»¶гҒӘгӮү lines.txt гҒҜдҪңгӮүгҒӘгҒ„гҖӮissueиө·зҘЁгғ»д»–гғ•гӮЎгӮӨгғ«з·ЁйӣҶгғ»gitж“ҚдҪңгҒҜгҒ—гҒӘгҒ„гҖӮи‘—дҪңжЁ©пјҡеӣәжңүеҗҚгғ»ж•ҷзҫ©гғ»е®ҹеңЁдәәзү©гҒ®иЎЁиұЎгҒҜдҪҝгӮҸгҒҡж§ӢйҖ гҒ®гҒҝпјҲе®—ж•ҷгғ»дәәзү©и»ёгҒҜзү№гҒ«гҖҢйўЁгҖҚгғўгғҒгғјгғ•еҺіе®ҲпјүгҖӮ
      - name: Upload axis candidates
        uses: actions/upload-artifact@v4
        with:
          name: discover-${{ strategy.job-index }}
          path: /tmp/out
          if-no-files-found: ignore
  integrate:
    needs: discover
    if: always() && needs.discover.result != 'skipped'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: auto/worldview-epics
          fetch-depth: 0
      - name: Download all axis candidates
        uses: actions/download-artifact@v4
        with:
          path: /tmp/disc
      - name: Integrate (dedup + single push)
        run: |
          set -e
          git config user.name "worldview-epic-bot"
          git config user.email "actions@users.noreply.github.com"
          echo '' | base64 -d > /tmp/refill.py
          python3 /tmp/refill.py
          git add docs/reference-epic-backlog.md
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "docs: иЈңе……гғ«гғјгғ— multi-modalзҷәжҺҳпјҲиҮӘеӢ•гғ»Nи»ёдёҰеҲ—гғ»dedupйӣҶзҙ„пјү"
            git push origin HEAD:auto/worldview-epics
          fi