name: unity-activation

# Unity Personal ライセンスのアクティベーション（一度だけ手動実行）。
# これで .alf を作り → https://license.unity3d.com/manual にアップ → .ulf を取得 →
# その中身を GitHub の Secrets（UNITY_LICENSE）に貼る。手順は docs/gameci-setup.md 参照。
on:
  workflow_dispatch: {}

jobs:
  activation:
    name: Request Unity activation file (.alf)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Request manual activation file
        id: getManualLicenseFile
        uses: game-ci/unity-request-activation-file@v2
        with:
          unityVersion: 6000.4.9f1   # ProjectSettings/ProjectVersion.txt と一致させる

      - name: Upload activation file (.alf)
        uses: actions/upload-artifact@v4
        with:
          name: Manual Activation File
          path: ${{ steps.getManualLicenseFile.outputs.filePath }}
