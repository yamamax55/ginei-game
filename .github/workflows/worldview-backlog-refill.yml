name: worldview-backlog-refill

# 参考EPICバックログの自動補充（docs/reference-epic-pipeline.md 参照）
# EPIC化(worldview-epic)の消費ペース=2冊/時間。6時間ごとに残量を見て、閾値を切ったら名著を補充する。
on:
  schedule:
    - cron: '23 */6 * * *'
  workflow_dispatch: {}

# EPIC化ワークフローと同じグループ＝auto/worldview-epics への push を直列化
concurrency:
  group: worldview-epic
  cancel-in-progress: false

permissions:
  contents: write
  issues: read
  id-token: write
  actions: read

jobs:
  refill:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: auto/worldview-epics
          fetch-depth: 0

      - name: Check backlog level
        id: level
        run: |
          count=$(grep -c '^| 未 |' docs/reference-epic-backlog.md || true)
          echo "remaining=$count" >> "$GITHUB_OUTPUT"
          echo "バックログ残量（未）: $count 冊"

      - name: Refill backlog
        if: ${{ steps.level.outputs.remaining < 16 }}
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN || secrets.CC }}
          claude_args: '--allowedTools "Bash,Read,Write,Edit,Glob,Grep,WebSearch,WebFetch"'
          prompt: |
            あなたは銀英伝風戦略ゲーム（戦術艦隊戦＋戦略・統治・群像・経済の多層シミュレーション）のリポジトリ
            （ブランチ auto/worldview-epics チェックアウト済み）で、参考EPICバックログを補充する。

            1. docs/reference-epic-pipeline.md（手順書）・docs/reference-epic-backlog.md（現在の表）・CLAUDE.md の
               「テスト基盤」節（既存純ロジック一覧）・docs/ 配下の *-reference-design.md 一覧を読む。
            2. 本システムに取り込むべき名著（古典・思想書・歴史書・経済書・SF・文学。ゲームも可）を最大20冊選定する。
               選定基準＝「このシステムの欠落軸にメカニクス／世界観の構造パターンを供給できるか」。
               分野バランス（軍事/政治統治/経済組織/歴史/社会心理/文学SF）を取ること。
            3. 重複除外（必須）: 以下のいずれかに該当する作品は選ばない——
               (a) バックログ表に既にある（済/未とも）
               (b) docs/*-reference-design.md が既にある
               (c) `gh issue list --state all --label type:epic --limit 100` のタイトルに登場する
               (d) CLAUDE.md で既にモジュール化済みの思想家の主著（例: 論語/ロールズ正義論/国家はなぜ衰退するのか/21世紀の資本）。
               ただし既存モジュールの「理論原典・深化」として新しい軸を足せる場合は、着眼点にその旨を明記すれば採用可。
            4. **数合わせをしない**: 確信を持って「効く」と言える作品だけ追加する。20冊未満でも0冊でもよい。
            5. docs/reference-epic-backlog.md の表の末尾（コメント行の直前）に
               `| 未 | <著者『作品』> | <着眼点＝欠落軸＋既存モジュール接続先> | — |` 形式で追記する。
               既存の行は一切変更しない。
            6. git config で user.name "worldview-epic-bot" / user.email "actions@users.noreply.github.com" を設定し、
               docs/reference-epic-backlog.md のみ add して commit し、auto/worldview-epics へ push する。
               コミットメッセージ: `docs: 参考EPICバックログ自動補充（+N冊）`。追加0冊なら commit せず正常終了。