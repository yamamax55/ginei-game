name: Unity - Acquire Activation File

# Unity Personal ライセンスの認証ファイル(.alf)を取得するための手動ワークフロー。
# 実行すると Manual_Activation_File アーティファクト(.alf)が生成される。
# それを https://license.unity3d.com/manual にアップロードして .ulf を入手し、
# UNITY_LICENSE Secret に登録する（詳細は README-unity-ci.md）。
# ※このワークフローは Secrets 不要で実行できる。最初に1回だけ使う。

on:
  workflow_dispatch: {}

jobs:
  activation:
    name: Request manual activation file (.alf)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ProjectVersion.txt の Unity バージョンに合わせた .alf を生成する
      - name: Request manual activation file
        id: getManualLicenseFile
        uses: game-ci/unity-request-activation-file@v2

      - name: Upload activation file
        uses: actions/upload-artifact@v4
        with:
          name: Manual_Activation_File
          path: ${{ steps.getManualLicenseFile.outputs.filePath }}
          retention-days: 7
