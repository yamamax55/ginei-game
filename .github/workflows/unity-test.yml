name: unity-test

# 実 Unity（GameCI headless）でプロジェクト全体をコンパイルし EditMode テストを回す。
# 価値：dotnet TestHarness では検証できない Game 層（MonoBehaviour/UI＝PlaytestRunner 等）の
#       コンパイル＋Unity Test Framework 検証がここで効く。
#
# ライセンス（いずれか・docs/gameci-setup.md）：
#   A) Personal（新ライセンス方式で .ulf が作られない場合）＝ UNITY_EMAIL + UNITY_PASSWORD（Unity ID）。
#      GameCI v4 が毎回アクティベートする。serial 不要。
#   B) .ulf が手に入る場合＝ UNITY_LICENSE（.ulf 中身）。
#   C) Pro/Plus＝ UNITY_EMAIL + UNITY_PASSWORD + UNITY_SERIAL。
# いずれも未設定なら自動スキップ（PR を止めない）。
#
# 注意：Personal のメール/パスワード方式は CI 実行ごとに seat をアクティベートする。
#       アクティベーション回数の上限に当たらないよう、定期 cron は付けず PR＋手動のみにしている
#       （頻度を上げたい/Pro を入れたら schedule を足す）。
on:
  pull_request:
  workflow_dispatch: {}

concurrency:
  group: unity-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: EditMode (real Unity)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
      UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
      UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
      UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Guard — ライセンス情報が「完全に」設定されているか
        id: guard
        run: |
          # Personal は UNITY_LICENSE(.ulf) が必須。Pro は UNITY_EMAIL+UNITY_PASSWORD+UNITY_SERIAL。
          # メール/パスワードだけ（.ulf も serial も無い）では unity-test-runner が
          # 'Missing Unity License File and no Serial' で必ず失敗する（実測）ので、
          # その場合は走らせず skip する（＝全 PR が赤くならない）。詳細は docs/gameci-setup.md。
          if [ -n "${UNITY_LICENSE}" ] || { [ -n "${UNITY_EMAIL}" ] && [ -n "${UNITY_PASSWORD}" ] && [ -n "${UNITY_SERIAL}" ]; }; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Unity ライセンス未設定/不完全のためスキップ（Personal=UNITY_LICENSE(.ulf) 必須／Pro=UNITY_EMAIL+UNITY_PASSWORD+UNITY_SERIAL）。dotnet TestHarness は別ワークフローで実行されます。docs/gameci-setup.md 参照。"
          fi

      - name: Cache Library
        if: steps.guard.outputs.ok == 'true'
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-

      - name: Run EditMode tests
        if: steps.guard.outputs.ok == 'true'
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          testMode: editmode
          githubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload test results
        if: always() && steps.guard.outputs.ok == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: unity-test-results
          path: artifacts
          if-no-files-found: ignore
