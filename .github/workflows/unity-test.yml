name: unity-test

# 実 Unity（GameCI headless）でプロジェクト全体をコンパイルし EditMode テストを回す。
# 価値：dotnet TestHarness では検証できない Game 層（MonoBehaviour/UI＝PlaytestRunner 等）の
#       コンパイル＋Unity Test Framework 検証がここで効く。
# 前提：GitHub Secrets に UNITY_LICENSE（Personal の .ulf 中身）。未設定なら自動スキップ。
#       設定手順は docs/gameci-setup.md。
on:
  pull_request:
  schedule:
    - cron: '37 */6 * * *'   # 6時間ごと :37（他 cron :3/:23/:43/:47 と衝突回避）
  workflow_dispatch: {}

concurrency:
  group: unity-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: EditMode (real Unity)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Guard — UNITY_LICENSE が設定されているか
        id: guard
        run: |
          if [ -n "${UNITY_LICENSE}" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::notice::UNITY_LICENSE 未設定のため Unity テストをスキップします（docs/gameci-setup.md 参照）。dotnet TestHarness は別ワークフローで実行されます。"
          fi

      - name: Cache Library
        if: steps.guard.outputs.ok == 'true'
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-

      - name: Run EditMode tests
        if: steps.guard.outputs.ok == 'true'
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          testMode: editmode
          githubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload test results
        if: always() && steps.guard.outputs.ok == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: unity-test-results
          path: artifacts
          if-no-files-found: ignore
