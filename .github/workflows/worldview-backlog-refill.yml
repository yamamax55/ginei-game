name: worldview-backlog-refill

# 補充ループ multi-modal発掘（docs/reference-epic-categories.md の各軸を並列に掘る）
# 6時間ごと・未16冊未満で発動。各軸が互いをblindに発掘＝自分の概念外のネタが入る
on:
  schedule:
    - cron: '23 */6 * * *'
  workflow_dispatch: {}

concurrency:
  group: worldview-epic
  cancel-in-progress: false

permissions:
  contents: write
  issues: read
  id-token: write
  actions: read

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      needed: ${{ steps.gate.outputs.needed }}
      matrix: ${{ steps.gate.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: auto/worldview-epics
          fetch-depth: 0
      - name: Gate (level check) and build axis matrix
        id: gate
        run: |
          REMAIN=$(grep -c '^| 未 |' docs/reference-epic-backlog.md || echo 0)
          echo "backlog 未: $REMAIN"
          if [ "$REMAIN" -ge 16 ]; then
            echo "needed=false" >> "$GITHUB_OUTPUT"
            echo "matrix=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "needed=true" >> "$GITHUB_OUTPUT"
          MATRIX=$(python3 - <<'PY'
import json,re
rows=[]
for l in open("docs/reference-epic-categories.md",encoding="utf-8"):
    l=l.rstrip("\n")
    if not l.startswith("| "): continue
    if "<!--" in l: continue
    cells=[c.strip() for c in l.strip().strip("|").split("|")]
    if len(cells)<2: continue
    axis,hint=cells[0],cells[1]
    if axis=="軸" or set(axis)<=set("-: "): continue
    if not axis: continue
    rows.append({"axis":axis,"hint":hint})
print(json.dumps(rows,ensure_ascii=False))
PY
)
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  discover:
    needs: gate
    if: needs.gate.outputs.needed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      max-parallel: 6
      fail-fast: false
      matrix:
        item: ${{ fromJson(needs.gate.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: auto/worldview-epics
          fetch-depth: 0
      - name: Discover candidates on one axis
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ github.token }}
          AXIS: ${{ matrix.item.axis }}
          HINT: ${{ matrix.item.hint }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN || secrets.CC }}
          claude_args: '--allowedTools "Bash,Read,Grep,Glob,WebSearch"'
          prompt: |
            探索軸＝環境変数 AXIS、探索指示＝環境変数 HINT。
            この軸で「本システム（銀英伝風の星間国家戦略＋思想/歴史/経済/群像シミュ）」の欠落軸に効くネタを最大3件発掘する。
            手順：
            1. 重複除外（必須）。以下と重なるものは選ばない——
               (a) docs/reference-epic-backlog.md の既存行（済/未/吸収とも）
               (b) docs/*-reference-design.md が既にある題材
               (c) `gh issue list --state all --label type:epic --limit 100` のタイトルに登場する題材
               (d) CLAUDE.md「テスト基盤」節で既にモジュール化済みの概念
            2. **数合わせをしない**。確信を持って「効く」と言えるものだけ（最大3件・0件でもよい）。分野の偏りを避ける。
            3. 各ネタを /tmp/out/lines.txt に1行ずつ追記（mkdir -p /tmp/out してから）：
               | 未 | [AXISの値] 名称 | 着眼点＝欠落軸＋既存モジュール接続先 | — |
            0件なら /tmp/out/lines.txt は作らない or 空でよい。issue起票・他ファイル編集・git操作はしない。
            著作権：固有名・教義・実在人物の表象は使わず構造パターンのみ（宗教・人物軸は特に「風」モチーフ厳守）。
      - name: Upload axis candidates
        uses: actions/upload-artifact@v4
        with:
          name: discover-${{ strategy.job-index }}
          path: /tmp/out
          if-no-files-found: ignore

  integrate:
    needs: discover
    if: always() && needs.discover.result != 'skipped'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: auto/worldview-epics
          fetch-depth: 0
      - name: Download all axis candidates
        uses: actions/download-artifact@v4
        with:
          path: /tmp/disc
      - name: Integrate (dedup + single push)
        run: |
          set -e
          git config user.name "worldview-epic-bot"
          git config user.email "actions@users.noreply.github.com"
          python3 - <<'PY'
import glob,re
p="docs/reference-epic-backlog.md"
lines=open(p,encoding="utf-8").read().split("\n")
def key(row):
    cells=[c.strip() for c in row.strip().strip("|").split("|")]
    if len(cells)<2: return None
    name=re.sub(r'^\[[^\]]*\]\s*','',cells[1])
    return name.strip()
existing=set()
for l in lines:
    if l.startswith("| 未 |") or l.startswith("| 済 |") or l.startswith("| 吸収 |"):
        k=key(l)
        if k: existing.add(k)
newrows=[]
for f in sorted(glob.glob("/tmp/disc/*/lines.txt")):
    for l in open(f,encoding="utf-8"):
        l=l.rstrip("\n")
        if not l.startswith("| 未 |"): continue
        k=key(l)
        if not k or k in existing: continue
        existing.add(k); newrows.append(l)
if newrows:
    out=[]; inserted=False
    for l in lines:
        if (not inserted) and l.startswith("<!--"):
            out.extend(newrows); inserted=True
        out.append(l)
    if not inserted: out.extend(newrows)
    open(p,"w",encoding="utf-8").write("\n".join(out))
    print(f"added {len(newrows)} candidates")
else:
    print("added 0 candidates")
PY
          git add docs/reference-epic-backlog.md
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "docs: 補充ループ multi-modal発掘（自動・N軸並列・dedup集約）"
            git push origin HEAD:auto/worldview-epics
          fi